name: Generate SDK Docs

on:
  push:
    branches:
      - main

jobs:
  generate-docs:
    name: Generate SDK Docs JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: poetry install --with dev

      - name: Generate SDK docs JSON
        run: poetry run python scripts/generate_sdk_docs.py

      - name: Upload SDK docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdk-docs-json
          path: sdk-data/
          retention-days: 90
